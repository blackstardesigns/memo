name: Release

# Builds the single-binary `memo` for every supported platform and publishes a
# GitHub Release. Triggered by a `v*` tag — which publish.yml (in the private dev
# repo) pushes here. Public repos get free standard-runner Actions minutes, so the
# expensive whisper.cpp compile and the macOS builds cost nothing.
#
# This file is part of the published source, so it also exists in the private dev
# repo. The `if: github.repository != ...` guards keep it from ever building there.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    name: Build (${{ matrix.target }})
    if: github.repository != 'blackstardesigns/ai-note-taker'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-14
            target: x86_64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
          - os: windows-2022
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends cmake libasound2-dev pkg-config

      - name: Install system dependencies (macOS)
        if: startsWith(matrix.os, 'macos')
        run: brew install cmake

      # Windows: CMake + MSVC ship with the windows-2022 runner — no extra install.

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: build-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: build-${{ matrix.target }}-

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/memo"
          ASSET_NAME="memo-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir staging
          cp "$BIN" staging/memo
          tar -C staging -czf "${ASSET_NAME}.tar.gz" memo
          echo "ASSET_FILE=${ASSET_NAME}.tar.gz" >> "$GITHUB_ENV"

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "target\${{ matrix.target }}\release\memo.exe"
          $assetName = "memo-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          Copy-Item $bin staging\memo.exe
          Compress-Archive -Path staging\memo.exe -DestinationPath "${assetName}.zip"
          "ASSET_FILE=${assetName}.zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET_FILE }}
          if-no-files-found: error
          retention-days: 1

  universal:
    name: Build macOS Universal Binary
    needs: [build]
    if: github.repository != 'blackstardesigns/ai-note-taker'
    runs-on: macos-14

    steps:
      - name: Download aarch64 artifact
        uses: actions/download-artifact@v4
        with:
          name: aarch64-apple-darwin
          path: dl/aarch64

      - name: Download x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: x86_64-apple-darwin
          path: dl/x86_64

      - name: Create universal binary with lipo
        run: |
          mkdir -p bins
          tar -C bins -xzf "dl/aarch64/memo-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz"
          mv bins/memo bins/memo-aarch64
          tar -C bins -xzf "dl/x86_64/memo-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz"
          mv bins/memo bins/memo-x86_64
          lipo -create -output bins/memo bins/memo-aarch64 bins/memo-x86_64
          lipo -info bins/memo

      - name: Package universal binary
        run: |
          ASSET_NAME="memo-${{ github.ref_name }}-universal-apple-darwin"
          tar -C bins -czf "${ASSET_NAME}.tar.gz" memo
          echo "ASSET_FILE=${ASSET_NAME}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload universal artifact
        uses: actions/upload-artifact@v4
        with:
          name: universal-apple-darwin
          path: ${{ env.ASSET_FILE }}
          if-no-files-found: error
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: [build, universal]
    if: github.repository != 'blackstardesigns/ai-note-taker'
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source (for release notes)
        uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          sha256sum memo-*.tar.gz memo-*.zip > "memo-${{ github.ref_name }}-SHA256SUMS.txt"
          cat "memo-${{ github.ref_name }}-SHA256SUMS.txt"

      - name: Locate release notes
        id: notes
        run: |
          FILE=".release-notes/${{ github.ref_name }}.md"
          if [ -f "$FILE" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "path=$FILE" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release (handwritten notes)
        if: steps.notes.outputs.found == 'true'
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.notes.outputs.path }}
          # Tags like v0.1.0-rc1 (containing a hyphen) are marked pre-release.
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/memo-*.tar.gz
            artifacts/memo-*.zip
            artifacts/memo-${{ github.ref_name }}-SHA256SUMS.txt

      - name: Create GitHub Release (auto-generated notes)
        if: steps.notes.outputs.found != 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/memo-*.tar.gz
            artifacts/memo-*.zip
            artifacts/memo-${{ github.ref_name }}-SHA256SUMS.txt
