name: Publish to public repo

# Snapshots the current committed source onto the PUBLIC release repo as a single
# clean commit + version tag. The tag push is made with a Personal Access Token
# (NOT the default GITHUB_TOKEN) — that is what lets the push TRIGGER release.yml
# in the public repo, which then builds the multi-platform binaries and publishes
# the GitHub Release.
#
# Private dev history, branch names, commit messages, and anything marked
# `export-ignore` in .gitattributes (.claude/, this file, *.private.*) never
# leave this private repo.
#
# ── One-time setup (this PRIVATE repo → Settings → Secrets and variables → Actions)
#   Secret   PUBLIC_REPO_TOKEN : a fine-grained PAT scoped to ONLY the public repo,
#                                with permissions  Contents: Read & write  AND
#                                Workflows: Read & write  (Workflows is REQUIRED to
#                                push files under .github/workflows/ — common gotcha).
#   Variable PUBLIC_REPO        : the public repo as  owner/name  (e.g. me/memo).
#
# ── Before dispatching
#   Bump `version` in Cargo.toml, run `cargo build` to refresh Cargo.lock, commit.
#   Then run this workflow (Actions tab → "Publish to public repo" → Run workflow,
#   or:  gh workflow run publish.yml -f version=0.1.0 ).

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, e.g. 0.1.0 (must match Cargo.toml). Append -something for a pre-release, e.g. 0.1.0-rc1.'
        required: true
        type: string
      dry_run:
        description: 'Build the snapshot + tag locally but do NOT push to the public repo'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private source
        uses: actions/checkout@v5

      - name: Validate version and Cargo.toml sync
        run: |
          set -euo pipefail
          VERSION='${{ inputs.version }}'
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$'; then
            echo "::error::version '$VERSION' is not semver (e.g. 0.1.0 or 0.1.0-rc1)"; exit 1
          fi
          CARGO_VER="$(sed -nE 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' Cargo.toml | head -1)"
          if [ "$CARGO_VER" != "$VERSION" ]; then
            echo "::error::Cargo.toml version ($CARGO_VER) != input ($VERSION). Bump Cargo.toml, run 'cargo build', commit, then retry."
            exit 1
          fi
          echo "Publishing v$VERSION"

      - name: Build clean export tree
        run: |
          set -euo pipefail
          rm -rf /tmp/export && mkdir -p /tmp/export
          # Honors .gitattributes export-ignore; uses the latest COMMIT (not the
          # working tree), so make sure your release commit is in before running.
          git archive HEAD | tar -x -C /tmp/export
          echo "── Files that will be published ──"
          (cd /tmp/export && find . -type f | sort | sed 's|^\./||')
          if [ -e /tmp/export/.claude ] || [ -e /tmp/export/.github/workflows/publish.yml ]; then
            echo "::error::private files leaked into the export tree — check .gitattributes"; exit 1
          fi

      - name: Clone public repo
        env:
          TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
          PUBLIC_REPO: ${{ vars.PUBLIC_REPO }}
        run: |
          set -euo pipefail
          if [ -z "${PUBLIC_REPO:-}" ]; then
            echo "::error::Set the PUBLIC_REPO repo variable (owner/name) in this repo's Actions settings."; exit 1
          fi
          if [ -z "${TOKEN:-}" ]; then
            echo "::error::Set the PUBLIC_REPO_TOKEN secret (fine-grained PAT) in this repo's Actions settings."; exit 1
          fi
          git clone "https://x-access-token:${TOKEN}@github.com/${PUBLIC_REPO}.git" /tmp/public
          cd /tmp/public
          # New/empty public repo has no main branch yet → start one.
          git checkout main 2>/dev/null || git checkout --orphan main

      - name: Sync snapshot into public working tree
        run: |
          set -euo pipefail
          cd /tmp/public
          # Replace the entire tree (keep .git) with this release's clean source.
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -a /tmp/export/. .
          git add -A

      - name: Commit and tag
        run: |
          set -euo pipefail
          cd /tmp/public
          # Local identity so BOTH the commit and the annotated tag have an author.
          git config user.name 'memo-release-bot'
          git config user.email 'actions@users.noreply.github.com'
          git commit -m "Release v${{ inputs.version }}" --allow-empty
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          echo "── Snapshot commit ──"
          git show --stat HEAD | head -60

      - name: Push to public repo (main + tag)
        if: ${{ inputs.dry_run == false }}
        run: |
          set -euo pipefail
          cd /tmp/public
          git push origin main
          git push origin "v${{ inputs.version }}"
          echo "Pushed v${{ inputs.version }} to ${{ vars.PUBLIC_REPO }}."
          echo "release.yml in the public repo is now building the binaries:"
          echo "  https://github.com/${{ vars.PUBLIC_REPO }}/actions"

      - name: Dry run — nothing pushed
        if: ${{ inputs.dry_run == true }}
        run: |
          echo "dry_run=true: snapshot commit and tag were built but NOT pushed."
